name: Set repository metadata

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Set description and homepage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH "repos/${{ github.repository }}" --input - <<'EOF'
          {
            "description": "Official WordPress plugin: sync Feedico merchants and coupons, shortcodes and Gutenberg blocks. Docs: feedico.io/docs",
            "homepage": "https://feedico.io"
          }
          EOF

      - name: Set topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT "repos/${{ github.repository }}/topics" --input - <<'EOF'
          {
            "names": [
              "feedico",
              "wordpress",
              "wordpress-plugin",
              "coupons",
              "merchants",
              "affiliate",
              "affiliate-marketing",
              "coupon-api",
              "gutenberg",
              "sync"
            ]
          }
          EOF
