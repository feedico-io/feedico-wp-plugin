name: Set repository metadata

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  metadata: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Configure repository About section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH "repos/${{ github.repository }}" \
            -f description='Official WordPress plugin: sync Feedico merchants & coupons, shortcodes & Gutenberg blocks. Docs: feedico.io/docs' \
            -f homepage='https://feedico.io'

          echo '{"names":["feedico","wordpress","wordpress-plugin","coupons","merchants","affiliate","affiliate-marketing","coupon-api","gutenberg","sync"]}' \
            | gh api --method PUT "repos/${{ github.repository }}/topics" --input -
